<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="background-blur"></div>

    <div class="content-wrapper">
        
        <header>
            <nav class ="navbar">
                <img src="mangonav.jpg" class="logo" alt="Mango Logo">

                <ul class ="navlist">
                    <li><a href="home.html">Home</a></li>                    
                    <li><a href ="store.html">Store</a></li>
                    <li><a href="Accessories.html">Accessories</a></li>
                    <li><a href="support.html">Support</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
                <h2 style="text-align: center; font-size: 50px;">Accessories</h2>
        </header>



        <section class="main-content"> 
            <article class="products">
                <div class="product-box">
                    <img src="products/accessories/bag.jpg" alt="Product 1">
                    <h3>Laptop bag</h3>
                    <p>Carry your laptop to travel safely with this laptop bag.</p>
                    <p class="price">$19.99</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>
                
                <div class="product-box">
                    <img src="products/accessories/mousepad.png" alt="Product 2">
                    <h3>Mousepad</h3>
                    <p>A smooth surface for your amazing mouse.</p>
                    <p class="price">$6.99</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>
                
                <div class="product-box">
                    <img src="products/accessories/kit.png" alt="Product 3">
                    <h3>Cleaning kit</h3>
                    <p>Easy to clean cleaning kit!</p>
                    <p class="price">$10.99</p>
                    <button onclick="addToCart(this)">Add to Cart</button>
                </div>
            </article>
        </section>
                <script src="cart.js"></script>

</body>
</html>
